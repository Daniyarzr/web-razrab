<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Портфолио разработчика</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb--left"></div>
    <div class="bg-orb bg-orb--right"></div>

    <main class="container">
      <header class="hero card reveal">
        <div class="hero__meta">WEB DEVELOPER PORTFOLIO</div>
        <div class="hero__body">
          <div class="hero__text">
            <h1 id="heroName"></h1>
            <h2 id="heroTitle"></h2>
            <p id="heroSubtitle"></p>
            <div class="hero__actions">
              <a class="btn" href="#portfolio">Смотреть работы</a>
              <a
                class="btn btn--secondary"
                id="heroTelegramBtn"
                href="#"
                target="_blank"
                rel="noreferrer"
                >Написать в TG</a
              >
            </div>
          </div>
          <div class="hero__photo-wrap">
            <img id="heroAvatar" src="" alt="Фото разработчика" />
          </div>
        </div>
      </header>

      <section class="about card reveal">
        <span class="section-tag">01 / Обо мне</span>
        <h3 id="aboutHeading"></h3>
        <p id="aboutText"></p>
      </section>

      <section class="services card reveal">
        <span class="section-tag">02 / Услуги</span>
        <ul id="servicesList"></ul>
      </section>

      <section class="portfolio card reveal" id="portfolio">
        <div class="portfolio__head">
          <span class="section-tag">03 / Портфолио</span>
          <p>Каждый проект можно показать в нескольких скринах.</p>
        </div>
        <div id="portfolioGrid" class="portfolio__grid"></div>
      </section>

      <section class="contacts card reveal">
        <span class="section-tag">04 / Контакты</span>
        <div class="contacts__items">
          <a id="contactTelegram" href="#" target="_blank" rel="noreferrer"></a>
          <a id="contactEmail" href="#"></a>
          <a id="contactPhone" href="#"></a>
        </div>
      </section>
    </main>

    <script src="/site.js"></script>
  </body>
</html>
